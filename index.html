<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>走馬灯</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="走馬灯">
    <link rel="apple-touch-icon" href="icon9.jpg?v=2">

    <style>
        :root {
            --app-font: Futura, 'Century Gothic', 'Noto Sans JP', sans-serif;
        }

        body {
            font-family: var(--app-font);
            background-color: #111;
            color: #f4ebd0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #app {
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            position: relative;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button, input, select, textarea {
            font-family: inherit;
        }

        .back-btn {
            background: none; border: none; color: #f4ebd0; font-size: 14px;
            cursor: pointer; padding: 0; letter-spacing: 1px; width: 60px; text-align: left;
        }
        .header-spacer { width: 60px; }

        /* --- 1. 月選択画面 --- */
        #month-screen { display: flex; flex-direction: column; height: 100dvh; position: relative; -webkit-tap-highlight-color: transparent; }
        .month-screen-header {
            position: absolute; top: 0; left: 0; width: 100%; text-align: center; padding: 40px 0 20px 0;
            font-size: 18px; letter-spacing: 4px; z-index: 20; background: linear-gradient(to bottom, rgba(26,26,26,0.9) 20%, transparent); pointer-events: none;
        }
        #month-list { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .month-card {
            position: absolute; left: 0; right: 0; top: 0; bottom: 0; margin: auto; width: 85%; height: auto; aspect-ratio: 16 / 9;
            background-color: #222; border: 2px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 15px 35px rgba(0,0,0,0.8); cursor: pointer; opacity: 0; transform: translateY(0); pointer-events: none; z-index: 0;
        }
        .month-card.active { transform: translateY(0); opacity: 1; z-index: 10; border-color: #f4ebd0; pointer-events: auto; filter: blur(0px) brightness(1); }
        .month-card.prev { transform: translateY(-60%); opacity: 0.85; z-index: 5; pointer-events: auto; filter: blur(1px) brightness(0.75); }
        .month-card.next { transform: translateY(60%); opacity: 0.85; z-index: 5; pointer-events: auto; filter: blur(1px) brightness(0.75); }
        .month-card.hidden-prev { transform: translateY(-120%); opacity: 0; }
        .month-card.hidden-next { transform: translateY(120%); opacity: 0; }

        .month-name { font-size: 32px; letter-spacing: 3px; z-index: 2; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); }
        .month-card.has-data::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(45deg, #4a3f35, #2a221d); opacity: 0.7; z-index: 1; }

        .bottom-menu { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 30; pointer-events: auto; }
        .text-btn { background: none; border: 1px solid #444; color: #888; padding: 8px 15px; font-size: 10px; letter-spacing: 2px; cursor: pointer; border-radius: 20px; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .text-btn:hover { background-color: #333; color: #f4ebd0; border-color: #666; }

        /* --- 2. ホーム画面 --- */
        #home-screen { display: none; flex-direction: column; height: 100dvh; }
        .home-header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #333; margin-top: 10px; }
        h2.screen-title { margin: 0; flex-grow: 1; text-align: center; font-size: 20px; letter-spacing: 2px; font-weight: normal; }
        #calendar-container { padding: 20px; overflow-y: auto; flex-grow: 1; overscroll-behavior-y: auto; }
        .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 10px; text-align: center; font-size: 12px; color: #666; }
        #calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 30px; }

        .day-box {
            aspect-ratio: 1; background-color: #2a2a2a; border: 1px solid #444; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #888; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }
        .day-box.out-of-month { opacity: 0.4; background-color: #151515; border-color: #222; }
        .day-box.today { border: 2px solid #b22222; color: #f4ebd0; box-shadow: inset 0 0 15px rgba(178, 34, 34, 0.2); opacity: 1; }
        .day-box.recorded { background-color: #4a3f35; color: #f4ebd0; border-color: #665; opacity: 1; }
        .day-box.recorded::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); }
        .day-box span { position: relative; z-index: 1; }

        #tickets-area { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        .ticket {
            background-color: #f4ebd0; color: #111; border: 2px dashed #111; border-radius: 8px; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between; transition: transform 0.2s, background-color 0.2s; position: relative; -webkit-tap-highlight-color: transparent;
        }
        .ticket::before, .ticket::after { content: ''; position: absolute; top: 50%; width: 16px; height: 16px; background-color: #1a1a1a; border-radius: 50%; transform: translateY(-50%); }
        .ticket::before { left: -8px; } .ticket::after { right: -8px; }
        .ticket.locked { background-color: #2a2a2a; color: #666; border-color: #444; }
        .ticket.locked .ticket-dates { color: #555; }
        .ticket-info { display: flex; flex-direction: column; cursor: default; }
        .ticket-week { font-size: 16px; font-weight: bold; letter-spacing: 2px; }
        .ticket-dates { font-size: 11px; color: #444; margin-top: 4px; }
        
        .ticket-play { font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .ticket.locked .ticket-play { font-size: 14px; }
        .record-badge { font-size: 10px; background: #b22222; color: #fff; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .action-btns { display: flex; gap: 10px; }
        .ticket-action-btn { 
            background: none; border: 1px solid #111; color: #111; font-size: 14px; 
            cursor: pointer; border-radius: 4px; padding: 6px 12px; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .ticket-action-btn:hover { background-color: #111; color: #f4ebd0; }

        /* --- 共通：動画コンテナとウォーターマーク --- */
        .video-container { width: 100%; aspect-ratio: 16 / 9; background-color: #222; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 20px; }
        .video-element { width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; transition: opacity 0.3s ease; }
        
        .watermark-overlay {
            position: absolute; 
            bottom: 6px;  
            right: 10px;   
            color: rgba(244, 235, 208, 0.35); 
            font-size: 10px; 
            font-weight: normal; 
            letter-spacing: 1px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
            z-index: 30; pointer-events: none; display: none;
        }

        .loading-text {
            position: absolute;
            z-index: 15;
            color: #888;
            font-size: 12px;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite;
            display: none;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- 3. 撮影画面 --- */
        #camera-screen { display: none; flex-direction: column; height: 100dvh; background-color: #000; }
        .camera-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; margin-top: 10px; }
        #camera-date-display { flex-grow: 1; text-align: center; font-size: 16px; letter-spacing: 2px; color: #888; }
        
        #record-timer { position: absolute; top: 10px; right: 15px; color: #b22222; font-size: 14px; letter-spacing: 2px; z-index: 10; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
        #progress-container { width: 100%; height: 6px; background-color: #111; position: absolute; bottom: 0; left: 0; z-index: 10; }
        #progress-bar { height: 100%; width: 0%; background-color: #b22222; transition: width 0.1s linear; box-shadow: 0 0 10px rgba(178, 34, 34, 0.8); }

        .controls { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #record-btn { width: 70px; height: 70px; border-radius: 50%; background-color: #b22222; border: 4px solid #f4ebd0; cursor: pointer; outline: none; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #record-btn.recording { border-radius: 10px; transform: scale(0.9); }
        #record-btn:disabled { background-color: #555; border-color: #777; cursor: not-allowed; }

        /* --- 4. CUT画面 --- */
        #finish-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; background-color: #0a0a0a; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; }
        .finish-title { font-size: 32px; letter-spacing: 8px; color: #f4ebd0; margin-bottom: 20px; font-style: italic; }
        .finish-desc { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 50px; text-align: center; line-height: 1.6; }
        .finish-btn { background-color: transparent; border: 1px solid #b22222; color: #b22222; padding: 15px 40px; font-size: 14px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .finish-btn:hover { background-color: #b22222; color: #111; }

        /* --- 5. 再生画面 --- */
        #playback-screen { display: none; flex-direction: column; justify-content: center; height: 100dvh; background-color: #000; position: relative; }
        #playback-screen .camera-header { position: absolute; top: 10px; left: 0; width: 100%; box-sizing: border-box; z-index: 20; border-bottom: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding-top: 30px; }
        #playback-date-display { flex-grow: 1; text-align: center; font-size: 16px; letter-spacing: 2px; color: #888; }
        #playback-screen .video-container { margin: 0; position: relative; }
        #playback-view { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* --- 6. 設定画面 --- */
        #settings-screen {
            display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100dvh; background-color: rgba(10,10,10,0.95); position: absolute; top: 0; left: 0; width: 100%; z-index: 100;
            overflow-y: auto; padding: 40px 0; box-sizing: border-box;
        }
        .settings-title { font-size: 16px; letter-spacing: 4px; color: #f4ebd0; margin-bottom: 20px; margin-top: 30px; }
        
        #font-select-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; max-width: 360px; margin-bottom: 20px; }
        #font-select-container .month-opt-btn { padding: 10px 0; font-size: 11px; text-align: center; }

        .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 85%; max-width: 320px; margin-bottom: 20px; }
        .settings-grid .month-opt-btn { padding: 12px 0; text-align: center; }

        .month-opt-btn { background-color: #222; border: 1px solid #444; color: #888; padding: 10px 15px; font-size: 14px; border-radius: 4px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .month-opt-btn.selected { background-color: #b22222; color: #f4ebd0; border-color: #f4ebd0; }
        .close-settings-btn { background: none; border: 1px solid #888; color: #888; padding: 10px 30px; cursor: pointer; border-radius: 20px; margin-top: 40px; }

        /* --- 7. 書き出し画面 --- */
        #export-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; background-color: #0a0a0a; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; }
        #export-screen .finish-title { font-size: 24px; margin-bottom: 15px; }
        #export-screen .finish-desc { font-size: 12px; margin-bottom: 20px; text-align: center; }
        #export-canvas { width: 80%; max-width: 320px; aspect-ratio: 16 / 9; background-color: #000; border-radius: 4px; box-shadow: 0 5px 25px rgba(0,0,0,0.8); margin-bottom: 30px; border: 1px solid #333; filter: grayscale(30%); }
        #export-progress-container { width: 60%; height: 4px; background-color: #333; margin-bottom: 40px; border-radius: 2px; overflow: hidden; }
        #export-progress-bar { height: 100%; width: 0%; background-color: #f4ebd0; transition: width 0.3s; }
        #export-download-link { text-decoration: none; display: inline-block; margin-bottom: 0; }
        #export-screen .finish-btn { width: 260px; box-sizing: border-box; margin: 6px 0; text-align: center; white-space: nowrap; padding: 15px 20px; }

    </style>
</head>
<body>

    <div id="app">
        <div id="month-screen">
            <div class="month-screen-header">YEAR <span id="current-year-display"></span></div>
            <div id="month-list"></div>
            <div class="bottom-menu">
                <button class="text-btn" id="open-settings-btn">≡ SETTINGS</button>
            </div>
        </div>

        <div id="home-screen">
            <header class="home-header">
                <button class="back-btn" id="month-back-btn">&lt; BACK</button>
                <h2 class="screen-title" id="month-title">June</h2>
                <div class="header-spacer"></div>
            </header>
            <div id="calendar-container">
                <div class="weekday-header">
                    <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                </div>
                <div id="calendar"></div>
                <div id="tickets-area"></div>
            </div>
        </div>

        <div id="camera-screen">
            <header class="camera-header">
                <button class="back-btn" id="camera-back-btn">&lt; BACK</button>
                <div id="camera-date-display">REC</div>
                <div class="header-spacer"></div>
            </header>
            <div class="video-container">
                <div id="camera-loading" class="loading-text" style="display:block;">CAMERA SETUP...</div>
                <video id="camera-view" class="video-element" autoplay muted playsinline></video>
                <div id="camera-watermark" class="watermark-overlay"></div>
                <div id="record-timer">00:00 / 00:20</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
            </div>
            <div class="controls"><button id="record-btn" disabled></button></div>
        </div>

        <div id="finish-screen">
            <div class="finish-title">CUT.</div>
            <div class="finish-desc">今日の記録が完了しました</div>
            <button class="finish-btn" id="finish-ok-btn">RETURN</button>
        </div>

        <div id="playback-screen">
            <header class="camera-header">
                <button class="back-btn" id="playback-back-btn">&lt; BACK</button>
                <div id="playback-date-display">PLAY</div>
                <div class="header-spacer"></div>
            </header>
            <div class="video-container" id="playback-container">
                <div id="playback-loading" class="loading-text">LOADING...</div>
                <video id="playback-view" class="video-element" playsinline webkit-playsinline></video>
                <div id="playback-watermark" class="watermark-overlay"></div>
            </div>
        </div>

        <div id="settings-screen">
            <div class="settings-title">FONT</div>
            <div id="font-select-container"></div>

            <div class="settings-title">START MONTH</div>
            <div class="settings-grid" id="month-select-container"></div>
            
            <div class="settings-title">DATE</div>
            <div class="month-select-container">
                <button class="month-opt-btn" id="watermark-on-btn">ON</button>
                <button class="month-opt-btn" id="watermark-off-btn">OFF</button>
            </div>

            <button class="close-settings-btn" id="close-settings-btn">CLOSE</button>
            <button id="reset-db-btn" style="margin-top:40px; background:none; border:1px solid #444; color:#666; padding:5px 10px; font-size:10px; border-radius:10px;">RESET ALL DATA</button>
        </div>

        <div id="export-screen">
            <div class="finish-title" id="export-title">EXPORTING...</div>
            <div class="finish-desc" id="export-desc">1週間分をまとめています<br>結構待つよごめんね</div>
            <canvas id="export-canvas" width='1280' height='720'></canvas>
            <div id="export-progress-container"><div id="export-progress-bar"></div></div>
            <a id="export-download-link" style="display: none;"><button class="finish-btn">SAVE TO DEVICE</button></a>
            <button class="finish-btn" id="export-return-btn" style="display: none;">RETURN</button>
        </div>

    </div>

    <script>
        /* =========================================
           1. 設定データの読み込みと初期化
        ========================================= */
        const fontOptions = [
            { label: 'Futura', value: "Futura, 'Century Gothic', 'Noto Sans JP', sans-serif" },
            { label: 'Didot', value: "Didot, 'Bodoni MT', 'Noto Serif JP', serif" },
            { label: 'Serif', value: "'Times New Roman', 'Noto Serif JP', serif" },
            { label: 'Sans', value: "'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" }
        ];

        let appStartMonth = 1;
        let showWatermark = true;
        let appFont = fontOptions[0].value;

        try {
            appStartMonth = parseInt(localStorage.getItem('appStartMonth')) || 1;
            showWatermark = localStorage.getItem('showWatermark') !== 'false';
            const savedFont = localStorage.getItem('appFont');
            if (savedFont && fontOptions.some(opt => opt.value === savedFont)) { appFont = savedFont; }
        } catch (e) {}

        document.documentElement.style.setProperty('--app-font', appFont);

        /* =========================================
           2. データベース操作
        ========================================= */
        const dbName = 'OneYearInTwoHoursDB_v9';
        const storeName = 'videos';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open(dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const database = e.target.result;
                        if (!database.objectStoreNames.contains(storeName)) { database.createObjectStore(storeName); }
                    };
                    request.onsuccess = (e) => { db = e.target.result; resolve(); };
                    request.onerror = (e) => reject(request.error);
                } catch(err) { reject(err); }
            });
        }

        function saveVideoToDB(dateKey, blob) {
            return new Promise((resolve, reject) => {
                if (!db) { resolve(); return; }
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(blob, dateKey);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        function getVideoFromDB(dateKey) {
            return new Promise((resolve, reject) => {
                if (!db) { resolve(null); return; }
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(dateKey);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function getAllRecordedKeys() {
            return new Promise((resolve, reject) => {
                if (!db) { resolve([]); return; }
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAllKeys();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        document.getElementById('reset-db-btn').onclick = () => {
            if(confirm("※注意※\nすべての録画データを消去してリセットしますか？")) {
                try { const req = indexedDB.deleteDatabase(dbName); req.onsuccess = () => { alert("データをリセットしました。"); location.reload(); }; } catch(e) { alert("リセットに失敗しました。"); }
            }
        };

        async function getFullChunksForDate(key) {
            try {
                const result = await getVideoFromDB(key);
                if (!result) return [];
                if (Array.isArray(result)) {
                    return result.map(item => {
                        if (item && item.blob) return item;
                        return { blob: item, duration: 20000 }; 
                    });
                } else if (result instanceof Blob) {
                    return [{ blob: result, duration: 20000 }]; 
                }
                return [];
            } catch(e) { return []; }
        }

        /* =========================================
           3. アプリのUIとロジック構築
        ========================================= */
        const monthScreen = document.getElementById('month-screen');
        const monthList = document.getElementById('month-list');
        const homeScreen = document.getElementById('home-screen');
        const cameraScreen = document.getElementById('camera-screen');
        const finishScreen = document.getElementById('finish-screen');
        const playbackScreen = document.getElementById('playback-screen');
        const settingsScreen = document.getElementById('settings-screen');
        const exportScreen = document.getElementById('export-screen');
        
        const calendarElement = document.getElementById('calendar');
        const ticketsArea = document.getElementById('tickets-area');
        const monthTitle = document.getElementById('month-title');
        
        const cameraDateDisplay = document.getElementById('camera-date-display');
        const playbackDateDisplay = document.getElementById('playback-date-display');
        const cameraWatermark = document.getElementById('camera-watermark');
        const playbackWatermark = document.getElementById('playback-watermark');
        
        const cameraView = document.getElementById('camera-view');
        const playbackView = document.getElementById('playback-view');
        const playbackContainer = document.getElementById('playback-container');
        
        const cameraLoading = document.getElementById('camera-loading');
        const playbackLoading = document.getElementById('playback-loading');

        const recordBtn = document.getElementById('record-btn');
        const progressBar = document.getElementById('progress-bar');
        const recordTimer = document.getElementById('record-timer');

        const todayDateObj = new Date();
        const currentYearReal = todayDateObj.getFullYear();
        const currentMonthNumReal = todayDateObj.getMonth() + 1;
        const currentDateReal = todayDateObj.getDate();
        const todayResetObj = new Date(currentYearReal, currentMonthNumReal - 1, currentDateReal);

        const viewYear = currentYearReal;
        document.getElementById('current-year-display').textContent = viewYear;
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        let activeMonthIndex = 0; 
        let cards = [];
        let monthSequence = []; 
        let recordTargetYear = null;
        let recordTargetMonth = null;
        let recordTargetDay = null;
        let currentRecordingDateStr = "";
        let selectedMonth = null;
        let currentRenderYear = viewYear;
        
        // ★修正：recordedDataに「isComplete（20秒完了しているか）」のフラグを持たせる
        let recordedData = {};

        async function startApp() {
            try {
                await initDB();
                const keys = await getAllRecordedKeys();
                for (let key of keys) {
                    const chunks = await getFullChunksForDate(key);
                    const total = chunks.reduce((sum, item) => sum + item.duration, 0);
                    recordedData[key] = { exists: true, isComplete: total >= MAX_RECORD_TIME };
                }
            } catch (err) {}
            initMonthScreen();
            buildSettingsUI();
        }

        function initMonthScreen() {
            monthList.innerHTML = ''; cards = []; monthSequence = [];
            for (let i = 0; i < 12; i++) { let m = ((appStartMonth - 1 + i) % 12) + 1; monthSequence.push(m); }
            activeMonthIndex = monthSequence.indexOf(currentMonthNumReal);
            if (activeMonthIndex === -1) activeMonthIndex = 0;

            for (let i = 0; i < 12; i++) {
                let targetMonthNum = monthSequence[i];
                const card = document.createElement('div'); card.className = 'month-card';
                let targetYearForCard = viewYear; if (targetMonthNum < appStartMonth) targetYearForCard = viewYear + 1; 
                
                const hasData = Object.keys(recordedData).some(key => key.startsWith(`${targetYearForCard}-${targetMonthNum}-`) && recordedData[key].exists);
                if (hasData) card.classList.add('has-data');
                
                const nameSpan = document.createElement('div'); nameSpan.className = 'month-name'; nameSpan.textContent = monthNames[targetMonthNum - 1];
                card.appendChild(nameSpan);

                card.onclick = () => {
                    if (i === activeMonthIndex) { openMonth(targetMonthNum, targetYearForCard); } 
                    else if (i === activeMonthIndex - 1 || i === activeMonthIndex + 1) { activeMonthIndex = i; updateMonthCards(); }
                };
                monthList.appendChild(card); cards.push(card);
            }
            updateMonthCards();
        }

        function updateMonthCards() {
            cards.forEach((card, index) => {
                card.className = 'month-card'; 
                let targetMonthNum = monthSequence[index]; let targetYearForCard = viewYear; if (targetMonthNum < appStartMonth) targetYearForCard = viewYear + 1;
                const hasData = Object.keys(recordedData).some(key => key.startsWith(`${targetYearForCard}-${targetMonthNum}-`) && recordedData[key].exists);
                if (hasData) card.classList.add('has-data');

                if (index === activeMonthIndex) {
                    card.classList.add('active');
                    document.getElementById('current-year-display').textContent = targetYearForCard;
                }
                else if (index === activeMonthIndex - 1) card.classList.add('prev');
                else if (index === activeMonthIndex + 1) card.classList.add('next');
                else if (index < activeMonthIndex - 1) card.classList.add('hidden-prev');
                else if (index > activeMonthIndex + 1) card.classList.add('hidden-next');
            });
        }

        let isScrolling = false; let startY = 0;
        monthScreen.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            if (e.deltaY > 20 && activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); lockScroll(); }
            else if (e.deltaY < -20 && activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); lockScroll(); }
        });
        monthScreen.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        monthScreen.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        monthScreen.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY; const delta = startY - endY;
            if (delta > 30 && activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); }
            else if (delta < -30 && activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); }
        });
        function lockScroll() { isScrolling = true; setTimeout(() => { isScrolling = false; }, 400); }

        document.getElementById('open-settings-btn').onclick = () => { settingsScreen.style.display = 'flex'; };
        document.getElementById('close-settings-btn').onclick = () => { settingsScreen.style.display = 'none'; };

        function buildSettingsUI() {
            const fontContainer = document.getElementById('font-select-container'); fontContainer.innerHTML = '';
            fontOptions.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'month-opt-btn';
                if(opt.value === appFont) btn.classList.add('selected');
                btn.textContent = opt.label;
                btn.onclick = () => {
                    appFont = opt.value; try { localStorage.setItem('appFont', appFont); } catch(e){}
                    document.documentElement.style.setProperty('--app-font', appFont);
                    document.querySelectorAll('#font-select-container .month-opt-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                fontContainer.appendChild(btn);
            });

            const monthContainer = document.getElementById('month-select-container'); monthContainer.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const btn = document.createElement('button'); btn.className = 'month-opt-btn';
                if(i === appStartMonth) btn.classList.add('selected');
                btn.textContent = `${i}月`;
                btn.onclick = () => {
                    try { localStorage.setItem('appStartMonth', i); } catch(e){}
                    appStartMonth = i;
                    document.querySelectorAll('#month-select-container .month-opt-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); initMonthScreen(); 
                };
                monthContainer.appendChild(btn);
            }

            const wOnBtn = document.getElementById('watermark-on-btn'); const wOffBtn = document.getElementById('watermark-off-btn');
            wOnBtn.classList.remove('selected'); wOffBtn.classList.remove('selected');
            if(showWatermark) wOnBtn.classList.add('selected'); else wOffBtn.classList.add('selected');

            wOnBtn.onclick = () => {
                showWatermark = true; try { localStorage.setItem('showWatermark', 'true'); } catch(e){}
                wOnBtn.classList.add('selected'); wOffBtn.classList.remove('selected');
            };
            wOffBtn.onclick = () => {
                showWatermark = false; try { localStorage.setItem('showWatermark', 'false'); } catch(e){}
                wOffBtn.classList.add('selected'); wOnBtn.classList.remove('selected');
            };
        }

        /* === 4. カレンダーとチケットの描画 === */
        function openMonth(month, year) {
            selectedMonth = month; currentRenderYear = year;
            monthTitle.textContent = `${monthNames[month - 1]} ${year}`;
            monthScreen.style.display = 'none'; homeScreen.style.display = 'flex';
            renderCalendarAndTickets();
        }

        function renderCalendarAndTickets() {
            calendarElement.innerHTML = ''; ticketsArea.innerHTML = '';
            const firstDayOfMonth = new Date(currentRenderYear, selectedMonth - 1, 1);
            const lastDayOfMonth = new Date(currentRenderYear, selectedMonth, 0);
            const startDate = new Date(firstDayOfMonth); startDate.setDate(startDate.getDate() - startDate.getDay());
            const endDate = new Date(lastDayOfMonth); endDate.setDate(endDate.getDate() + (6 - endDate.getDay()));

            let currentDate = new Date(startDate); let weekDatesArray = []; let weekNum = 1;

            while (currentDate <= endDate) {
                const boxYear = currentDate.getFullYear(); const boxMonth = currentDate.getMonth() + 1; const boxDate = currentDate.getDate();
                const dataKey = `${boxYear}-${boxMonth}-${boxDate}`;
                const dayBox = document.createElement('div'); dayBox.className = 'day-box';
                if (boxMonth !== selectedMonth) dayBox.classList.add('out-of-month');

                const isToday = (boxYear === currentYearReal && boxMonth === currentMonthNumReal && boxDate === currentDateReal);
                if (isToday) dayBox.classList.add('today');
                if (recordedData[dataKey] && recordedData[dataKey].exists) dayBox.classList.add('recorded');

                const dayText = document.createElement('span'); dayText.textContent = boxDate; dayBox.appendChild(dayText);
                
                dayBox.onclick = async () => {
                    if (isToday) {
                        const chunks = await getFullChunksForDate(dataKey);
                        const currentTotal = chunks.reduce((sum, item) => sum + item.duration, 0);
                        if (currentTotal < MAX_RECORD_TIME) {
                            openCameraScreen(boxYear, boxMonth, boxDate);
                            return;
                        }
                    }
                    
                    if (recordedData[dataKey] && recordedData[dataKey].exists) { 
                        // ★変更：カレンダーからの再生は「7秒間のチラ見せモード（true）」にする
                        startPlayback([dataKey], true); 
                        return; 
                    }
                    
                    if (!isToday) { 
                        if (currentDate > todayResetObj) alert('記憶がどれだけ大切で素晴らしくて、苦しいものなのか！'); 
                        else alert('この日は忙しかったんだっけ'); 
                    }
                };
                
                calendarElement.appendChild(dayBox); weekDatesArray.push(new Date(currentDate));
                if (currentDate.getDay() === 6) { createTicket(weekNum, weekDatesArray); weekNum++; weekDatesArray = []; }
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function createTicket(weekNum, datesInWeek) {
            const startDay = datesInWeek[0]; const endDay = datesInWeek[6];
            const startM = monthNames[startDay.getMonth()].substring(0, 3); const endM = monthNames[endDay.getMonth()].substring(0, 3);
            let dateLabel = (startDay.getMonth() === endDay.getMonth()) ? `${startM} ${startDay.getDate()} - ${endDay.getDate()}` : `${startM} ${startDay.getDate()} - ${endM} ${endDay.getDate()}`;

            let validKeys = [];
            datesInWeek.forEach(d => {
                const key = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                if (recordedData[key] && recordedData[key].exists) validKeys.push(key);
            });
            const recordedCount = validKeys.length;

            // ★修正：土曜日（最後の日）の録画が「20秒完全に完了しているか」を判定基準にする
            const lastDateKey = `${endDay.getFullYear()}-${endDay.getMonth() + 1}-${endDay.getDate()}`;
            const isLastDayComplete = recordedData[lastDateKey] && recordedData[lastDateKey].isComplete; 
            const isWeekOver = todayResetObj > endDay; 
            const isViewable = isLastDayComplete || isWeekOver;

            const ticket = document.createElement('div'); ticket.className = 'ticket';
            if (!isViewable) ticket.classList.add('locked');

            ticket.innerHTML = `
                <div class="ticket-info"><div class="ticket-week">WEEK ${weekNum}</div><div class="ticket-dates">${dateLabel}</div></div>
                <div class="ticket-play">
                    ${recordedCount > 0 && isViewable ? `<span class="record-badge">${recordedCount} REC</span>` : ''}
                    ${isViewable && recordedCount > 0 ? `<div class="action-btns"><button class="ticket-action-btn play-btn">▶</button><button class="ticket-action-btn save-btn">▼</button></div>` : (isViewable ? '▶' : '-')}
                </div>
            `;
            
            if (isViewable && recordedCount > 0) {
                const playBtn = ticket.querySelector('.play-btn'); const saveBtn = ticket.querySelector('.save-btn');
                playBtn.onclick = (e) => { e.stopPropagation(); startPlayback(validKeys); };
                saveBtn.onclick = (e) => { e.stopPropagation(); startExport(validKeys, dateLabel); };
                ticket.onclick = () => { startPlayback(validKeys); };
            } else if (isViewable && recordedCount === 0) { ticket.onclick = () => alert('この週には記録がありません。');
            } else { ticket.onclick = () => alert('週末の記録を終えるか、次の週になるまでのお楽しみです。'); }
            ticketsArea.appendChild(ticket);
        }

        /* === 5. 撮影システム === */
        let isRecording = false; let totalRecordTime = 0; let timerInterval; let mediaRecorder; let recordedChunks = [];
        const MAX_RECORD_TIME = 20000;
        let currentExistingChunks = []; 
        let segmentStartTime = 0;
        let cameraStream = null;
        
        // ★追加：タイマーの正確性を担保するため、録画中のセグメント時間を記録
        let currentSegmentDuration = 0; 

        async function openCameraScreen(y, m, d) {
            recordTargetYear = y; recordTargetMonth = m; recordTargetDay = d;
            const dataKey = `${y}-${m}-${d}`;
            currentRecordingDateStr = `${y}.${String(m).padStart(2, '0')}.${String(d).padStart(2, '0')}`;
            cameraDateDisplay.textContent = `${monthNames[m-1].substring(0,3)} ${d} - REC`;
            
            if (showWatermark) { cameraWatermark.textContent = currentRecordingDateStr; cameraWatermark.style.display = 'block'; } 
            else { cameraWatermark.style.display = 'none'; }

            homeScreen.style.display = 'none'; cameraScreen.style.display = 'flex';
            
            recordBtn.disabled = true; 
            recordBtn.classList.remove('recording');
            cameraLoading.style.display = 'block';
            cameraView.style.opacity = '0';
            isRecording = false;
            currentSegmentDuration = 0;

            currentExistingChunks = await getFullChunksForDate(dataKey);
            totalRecordTime = currentExistingChunks.reduce((sum, item) => sum + item.duration, 0);
            
            progressBar.style.width = (totalRecordTime / MAX_RECORD_TIME) * 100 + '%';
            recordTimer.textContent = `00:${Math.floor(totalRecordTime / 1000).toString().padStart(2, '0')} / 00:20`;

            startCamera(); 
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { aspectRatio: 16/9, facingMode: "environment" }, audio: true });
                cameraView.srcObject = stream;
                cameraStream = stream;
                
                cameraView.onloadedmetadata = () => {
                    cameraLoading.style.display = 'none';
                    cameraView.style.opacity = '1';
                    if (totalRecordTime < MAX_RECORD_TIME) {
                        recordBtn.disabled = false;
                    }
                };
            } catch (err) { alert("カメラの起動に失敗しました。"); }
        }

        function stopCamera() { 
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
            if (cameraView.srcObject) cameraView.srcObject = null;
        }

        function stopRecordingAndSave() {
            return new Promise((resolve) => {
                if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                    resolve();
                    return;
                }
                mediaRecorder.onstop = async () => {
                    const mimeType = mediaRecorder.mimeType || (recordedChunks[0] && recordedChunks[0].type) || '';
                    const blob = new Blob(recordedChunks, { type: mimeType }); 
                    
                    // ★修正：放置時間バグを防ぐため、Date.now()ではなく100msごとに加算した実録画時間を採用
                    const durationToAdd = Math.min(currentSegmentDuration, MAX_RECORD_TIME - totalRecordTime);
                    
                    if (durationToAdd > 100) { 
                        currentExistingChunks.push({ blob: blob, duration: durationToAdd });
                        totalRecordTime += durationToAdd;
                        const dataKey = `${recordTargetYear}-${recordTargetMonth}-${recordTargetDay}`;
                        try { 
                            await saveVideoToDB(dataKey, currentExistingChunks); 
                            recordedData[dataKey] = { exists: true, isComplete: totalRecordTime >= MAX_RECORD_TIME }; 
                        } catch(e) { console.error("保存失敗", e); }
                    }
                    currentSegmentDuration = 0;
                    resolve();
                };
                mediaRecorder.stop();
            });
        }

        recordBtn.onclick = async function() {
            if (!cameraStream) return;
            recordBtn.disabled = true; 

            if (isRecording) {
                isRecording = false; 
                recordBtn.classList.remove('recording'); 
                clearInterval(timerInterval);
                
                await stopRecordingAndSave(); 
                
                progressBar.style.width = (totalRecordTime / MAX_RECORD_TIME) * 100 + '%';
                recordTimer.textContent = `00:${Math.floor(totalRecordTime / 1000).toString().padStart(2, '0')} / 00:20`;
                
                if (totalRecordTime >= MAX_RECORD_TIME) {
                    stopCamera();
                    cameraScreen.style.display = 'none';
                    finishScreen.style.display = 'flex';
                } else {
                    recordBtn.disabled = false; 
                }
            } else {
                if (totalRecordTime >= MAX_RECORD_TIME) return;
                isRecording = true; 
                recordBtn.classList.add('recording');
                recordedChunks = [];
                currentSegmentDuration = 0;
                
                mediaRecorder = new MediaRecorder(cameraStream);
                mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); };
                mediaRecorder.start(200);
                recordBtn.disabled = false;

                timerInterval = setInterval(() => {
                    // ★修正：スリープ放置バグを防ぐため、フロントのタイマーで直接秒数を刻む
                    currentSegmentDuration += 100;
                    const displayTime = totalRecordTime + currentSegmentDuration;
                    progressBar.style.width = (displayTime / MAX_RECORD_TIME) * 100 + '%';
                    recordTimer.textContent = `00:${Math.floor(displayTime / 1000).toString().padStart(2, '0')} / 00:20`;
                    
                    if (displayTime >= MAX_RECORD_TIME) {
                        clearInterval(timerInterval);
                        recordBtn.click(); 
                    }
                }, 100);
            }
        };

        // ★追加：アプリがバックグラウンド（裏側）に回った際に、録画を強制的に止めて安全に保存する
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'hidden') {
                if (isRecording) {
                    isRecording = false; 
                    recordBtn.classList.remove('recording'); 
                    clearInterval(timerInterval);
                    await stopRecordingAndSave(); 
                }
                if (cameraScreen.style.display === 'flex') {
                    stopCamera(); 
                    cameraScreen.style.display = 'none'; 
                    homeScreen.style.display = 'flex'; 
                    renderCalendarAndTickets(); 
                    initMonthScreen();
                }
            }
        });

        document.getElementById('finish-ok-btn').onclick = () => {
            finishScreen.style.display = 'none'; homeScreen.style.display = 'flex';
            renderCalendarAndTickets(); initMonthScreen();
        };

        /* === 6. 再生画面 === */
        let playlistUrls = [];
        let currentPlayIndex = 0;
        let isPreviewMode = false;      // ★追加：チラ見せモードの判定
        let previewPlayTime = 0;        // ★追加：再生した秒数の合計
        let lastVideoTime = 0;          // ★追加：時間計算用

        async function startPlayback(keys, isPreview = false) {
            playlistUrls = [];
            isPreviewMode = isPreview;  // モードをセット
            previewPlayTime = 0;        // 再生秒数をリセット
            
            for (let key of keys) {
                const chunks = await getFullChunksForDate(key);
                const parts = key.split('-');
                const formattedDate = `${parts[0]}.${parts[1].padStart(2, '0')}.${parts[2].padStart(2, '0')}`;
                chunks.forEach(item => {
                    playlistUrls.push({ key: key, dateStr: formattedDate, url: URL.createObjectURL(item.blob) });
                });
            }
            if (playlistUrls.length === 0) { alert("再生できる動画が見つかりませんでした。"); return; }
            homeScreen.style.display = 'none'; playbackScreen.style.display = 'flex';
            currentPlayIndex = 0; playNextInPlaylist();
        }

        function playNextInPlaylist() {
            if (currentPlayIndex >= playlistUrls.length) { closePlaybackScreen(); return; }
            const currentItem = playlistUrls[currentPlayIndex];
            
            if (playlistUrls.length > 1) playbackDateDisplay.textContent = `WEEKLY MOVIE`;
            else { const parts = currentItem.key.split('-'); playbackDateDisplay.textContent = `${monthNames[parseInt(parts[1])-1].substring(0,3)} ${parts[2]} - PLAY`; }

            if (showWatermark) { playbackWatermark.textContent = currentItem.dateStr; playbackWatermark.style.display = 'block'; } 
            else { playbackWatermark.style.display = 'none'; }

            playbackLoading.style.display = 'block';
            playbackView.style.opacity = '0';
            
            playbackView.src = currentItem.url;
            lastVideoTime = 0; // 秒数計算の初期化
            
            playbackView.onplaying = () => {
                playbackLoading.style.display = 'none';
                playbackView.style.opacity = '1';
            };

            // ★追加：動画の時間を監視し、7秒に達したら静かに終了する
            playbackView.ontimeupdate = () => {
                if (!isPreviewMode) return;
                
                const currentTime = playbackView.currentTime;
                if (currentTime > lastVideoTime) {
                    previewPlayTime += (currentTime - lastVideoTime);
                }
                lastVideoTime = currentTime;

                if (previewPlayTime >= 7) {
                    playbackView.ontimeupdate = null;
                    closePlaybackScreen(); // 7秒で強制的にカレンダーへ戻る
                }
            };

            playbackView.play().catch(e => console.log("自動再生ブロック:", e));
            playbackView.onended = () => { currentPlayIndex++; playNextInPlaylist(); };
        }

        playbackContainer.onclick = () => { if (playbackView.paused) playbackView.play(); else playbackView.pause(); };

        function closePlaybackScreen() {
            // ★修正：イベントリスナーを全て解除して安全に閉じる
            playbackView.pause(); playbackView.onended = null; playbackView.onplaying = null; playbackView.ontimeupdate = null;
            playlistUrls.forEach(item => URL.revokeObjectURL(item.url)); playlistUrls = [];
            playbackView.src = ""; playbackScreen.style.display = 'none'; homeScreen.style.display = 'flex';
        }

        document.getElementById('playback-back-btn').onclick = closePlaybackScreen;

        /* === 7. 書き出し（エクスポート）システム === */
        const exportTitle = document.getElementById('export-title');
        const exportDesc = document.getElementById('export-desc');
        const exportProgressBar = document.getElementById('export-progress-bar');
        const exportProgressContainer = document.getElementById('export-progress-container');
        const exportDownloadLink = document.getElementById('export-download-link');
        const exportReturnBtn = document.getElementById('export-return-btn');
        
        const exportCanvas = document.getElementById('export-canvas');
        const exportCanvasCtx = exportCanvas.getContext('2d');

        async function startExport(keys, dateLabel) {
            homeScreen.style.display = 'none'; exportScreen.style.display = 'flex';
            exportTitle.textContent = "EXPORTING..."; exportDesc.innerHTML = "1週間分をまとめています<br>結構待つよごめんね";
            exportProgressBar.style.width = "0%"; exportProgressContainer.style.display = "block";
            exportDownloadLink.style.display = "none"; exportReturnBtn.style.display = "none";
            exportCanvas.style.display = "block"; 

            const exportVideo = document.createElement('video');
            exportVideo.playsInline = true; exportVideo.muted = false; 

            let audioCtx = null; let dest = null; let dummyOsc = null;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                dest = audioCtx.createMediaStreamDestination();
                dummyOsc = audioCtx.createOscillator();
                const dummyGain = audioCtx.createGain();
                dummyGain.gain.value = 0.0001; 
                dummyOsc.connect(dummyGain); dummyGain.connect(dest); dummyOsc.start();
                const source = audioCtx.createMediaElementSource(exportVideo);
                source.connect(dest);
            } catch(e) { console.log("AudioContext Error"); }

            const exportStream = exportCanvas.captureStream(30);
            if (dest) dest.stream.getAudioTracks().forEach(t => exportStream.addTrack(t));

            let mime = 'video/webm';
            if (MediaRecorder.isTypeSupported('video/mp4')) mime = 'video/mp4';
            const exportRecorder = new MediaRecorder(exportStream, { mimeType: mime });
            const exportChunks = [];
            exportRecorder.ondataavailable = e => { if(e.data.size > 0) exportChunks.push(e.data); };

            let allExportItems = [];
            for (let key of keys) {
                const chunks = await getFullChunksForDate(key);
                const parts = key.split('-');
                const dateStr = `${parts[0]}.${parts[1].padStart(2, '0')}.${parts[2].padStart(2, '0')}`;
                chunks.forEach(item => {
                    allExportItems.push({ key: key, dateStr: dateStr, blob: item.blob });
                });
            }

            if (allExportItems.length === 0) { alert("動画が見つかりませんでした。"); exportScreen.style.display = 'none'; homeScreen.style.display = 'flex'; return; }

            let currentIndex = 0; let isExporting = true; let exportDateStr = "";

            function exportDrawLoop() {
                if (!isExporting) return;
                exportCanvasCtx.fillStyle = '#000'; exportCanvasCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

                if (exportVideo.readyState >= 2 && !exportVideo.paused && !exportVideo.ended) {
                    const vw = exportVideo.videoWidth; const vh = exportVideo.videoHeight;
                    if (vw > 0 && vh > 0) {
                        let sWidth = vw, sHeight = vw * (9 / 16), sx = 0, sy = (vh - sHeight) / 2;
                        if (vw / vh > 16 / 9) { sHeight = vh; sWidth = vh * (16 / 9); sx = (vw - sWidth) / 2; sy = 0; }
                        exportCanvasCtx.drawImage(exportVideo, sx, sy, sWidth, sHeight, 0, 0, exportCanvas.width, exportCanvas.height);
                        
                        if (showWatermark && exportDateStr) {
                            exportCanvasCtx.fillStyle = "rgba(244, 235, 208, 0.35)";
                            exportCanvasCtx.font = `normal 34px ${appFont}`;
                            exportCanvasCtx.textAlign = "right";
                            exportCanvasCtx.textBaseline = "bottom"; 
                            exportCanvasCtx.shadowColor = "rgba(0,0,0,0.5)";
                            exportCanvasCtx.shadowBlur = 4;
                            exportCanvasCtx.fillText(exportDateStr, exportCanvas.width - 30, exportCanvas.height - 20);
                            exportCanvasCtx.shadowBlur = 0;
                        }
                    }
                }
                requestAnimationFrame(exportDrawLoop);
            }

            exportRecorder.start(1000); 
            exportDrawLoop(); 

            async function playNextForExport() {
                exportProgressBar.style.width = `${(currentIndex / allExportItems.length) * 100}%`;
                if (currentIndex >= allExportItems.length) {
                    isExporting = false; setTimeout(() => { exportRecorder.stop(); }, 500); return;
                }
                
                const item = allExportItems[currentIndex];
                exportDateStr = item.dateStr;

                exportVideo.src = URL.createObjectURL(item.blob);
                exportVideo.oncanplay = () => {
                    exportVideo.play().catch(e => { URL.revokeObjectURL(exportVideo.src); currentIndex++; playNextForExport(); });
                };
                exportVideo.onended = () => {
                    URL.revokeObjectURL(exportVideo.src);
                    currentIndex++; playNextForExport();
                };
            }

            exportRecorder.onstop = () => {
                exportProgressBar.style.width = "100%";
                if(dummyOsc) dummyOsc.stop();
                if(audioCtx) audioCtx.close();
                
                setTimeout(() => {
                    const ext = mime.includes('mp4') ? 'mp4' : 'webm';
                    const mergedBlob = new Blob(exportChunks, { type: mime });
                    const safeDateLabel = dateLabel.replace(/\s+/g, '_').replace(/\//g, '-');
                    
                    exportCanvas.style.display = "none";
                    exportTitle.textContent = "COMPLETE.";
                    exportDesc.innerHTML = "完了しました<br>端末に保存してください";
                    exportProgressContainer.style.display = "none";
                    
                    exportDownloadLink.href = URL.createObjectURL(mergedBlob);
                    exportDownloadLink.download = `1Year2Hours_${safeDateLabel}.${ext}`;
                    exportDownloadLink.style.display = "block";
                    exportReturnBtn.style.display = "block";
                }, 500);
            };
            playNextForExport();
        }

        exportReturnBtn.onclick = () => {
            if(exportDownloadLink.href) URL.revokeObjectURL(exportDownloadLink.href);
            exportScreen.style.display = 'none'; homeScreen.style.display = 'flex';
        };

        /* --- ナビゲーション --- */
        document.getElementById('camera-back-btn').onclick = async () => { 
            recordBtn.disabled = true; 
            if (isRecording) {
                isRecording = false; recordBtn.classList.remove('recording'); clearInterval(timerInterval);
                await stopRecordingAndSave(); 
            }
            stopCamera(); 
            cameraScreen.style.display = 'none'; 
            homeScreen.style.display = 'flex'; 
            renderCalendarAndTickets(); 
            initMonthScreen();
        };
        
        document.getElementById('month-back-btn').onclick = () => { homeScreen.style.display = 'none'; monthScreen.style.display = 'flex'; activeMonthIndex = monthSequence.indexOf(selectedMonth); if (activeMonthIndex === -1) activeMonthIndex = 0; updateMonthCards(); };

        startApp();
    </script>
</body>
</html>
